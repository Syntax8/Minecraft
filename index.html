<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Klan Minecraft - Syntax8</title>
    <style>
        body {
            /* PUNKTY 3 i 5: Inne tło (ciemne, minecraftowe) i obrazek przycisku */
            background-color: #1e1e1e;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAIAAAAC64paAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH5QgKAhwN4kP0GAAAAB1pVFh0Q29tbWVudAAAAAAAQ3JlYXRlZCB3aXRoIEdJTVBkLmXRbwAAADxJREFUOMtjvHTpEgMRgIHKgA4OjqKioqSkhIGBgaGhoampKTo6OjIykpCQEBERwcbGxsbGxsbGxsYGAAH8EskS/9B0AAAAAElFTkSuQmCC'); /* Delikatny deseń */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Bloczek w rogu i dryfujące bloczki nie robią pasków przewijania */
            height: 100vh;
        }

        #napis-klan {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            color: #55FF55; /* Minecraftowy jasnozielony */
            font-weight: bold;
            text-shadow: 4px 4px 0px #000;
        }

        /* PUNKT 1: Członkowie w lewym górnym rogu */
        #czlonkowie {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
            z-index: 50;
        }

        /* PUNKT 4: Kolorowy napis CZŁONKOWIE */
        #czlonkowie h2 {
            margin-bottom: 5px;
            color: #FF5555; /* Minecraftowy czerwonawy */
            text-shadow: 2px 2px 0px #000;
        }

        /* PUNKT 4: Kolorowe nazwy członków */
        #czlonkowie ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
        }

        #czlonkowie ul li:nth-child(1) { color: #55FFFF; } /* Blondi_Pl - błękitny */
        #czlonkowie ul li:nth-child(2) { color: #FFFF55; } /* 0skar3377 - żółty */
        #czlonkowie ul li:nth-child(3) { color: #FF55FF; } /* Dorianek558 - jasnofioletowy */

        /* Styl dla małego bloczka-przycisku w rogu */
        #przycisk-blok {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            /* PUNKT 5: Obrazek przycisku z wgranego pliku */
            background-image: url('blok.png');
            background-size: cover;
            cursor: pointer;
            z-index: 100;
            box-shadow: 3px 3px 0px #000;
            border: none;
        }

        /* PUNKT 2: Styl dla latających bloczków */
        .latajacy-blok {
            position: absolute;
            width: 50px;
            height: 50px;
            /* Używamy wgranego obrazka jako tła bloczków */
            background-image: url('blok.png');
            background-size: cover;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            pointer-events: none; /* Żeby nie zasłaniały kliknięć */
        }
    </style>
</head>
<body>

    <div id="napis-klan">KLAN</div>

    <div id="czlonkowie">
        <h2>CZŁONKOWIE</h2>
        <ul>
            <li>Blondi_Pl</li>
            <li>0skar3377</li>
            <li>Dorianek558</li>
        </ul>
    </div>

    <button id="przycisk-blok" onclick="toggleBlocks()"></button>

    <div id="container-bloczkow"></div>

    <script>
        const container = document.getElementById('container-bloczkow');
        const bloczki = [];
        let widoczne = true;

        // PUNKT 2: Funkcja tworząca losowe bloczki i dodająca im prędkość
        function stworzBloczki() {
            for (let i = 0; i < 15; i++) {
                const blok = document.createElement('div');
                blok.className = 'latajacy-blok';
                // Losowe pozycje startowe
                let x = Math.random() * 80 + 10;
                let y = Math.random() * 60 + 20;
                blok.style.left = x + "%";
                blok.style.top = y + "%";
                
                // Dodajemy dane o prędkości (w procentach ekranu na klatkę)
                const vx = (Math.random() - 0.5) * 0.05; // Bardzo wolno poziomo
                const vy = (Math.random() - 0.5) * 0.05; // Bardzo wolno pionowo
                
                container.appendChild(blok);
                bloczki.push({ element: blok, x: x, y: y, vx: vx, vy: vy });
            }
        }

        // PUNKT 2: Funkcja animująca bloczki (powolny dryf)
        function animujBloczki() {
            bloczki.forEach(blokInfo => {
                // Aktualizujemy pozycję
                blokInfo.x += blokInfo.vx;
                blokInfo.y += blokInfo.vy;

                // Odbijanie od "ścian" ekranu
                if (blokInfo.x < 0 || blokInfo.x > 95) blokInfo.vx *= -1;
                if (blokInfo.y < 0 || blokInfo.y > 95) blokInfo.vy *= -1;

                // Aplikujemy nową pozycję
                blokInfo.element.style.left = blokInfo.x + "%";
                blokInfo.element.style.top = blokInfo.y + "%";
            });
            requestAnimationFrame(animujBloczki); // Pętla animacji
        }

        // Funkcja pokazująca/chowająca bloczki
        function toggleBlocks() {
            widoczne = !widoczne;
            container.style.opacity = widoczne ? "1" : "0";
        }

        // Uruchomienie przy starcie
        stworzBloczki();
        animujBloczki();
    </script>

</body>
</html>
