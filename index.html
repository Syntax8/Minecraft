<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Klan Minecraft - Syntax8</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        #napis-klan {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            color: #55FF55;
            font-weight: bold;
            text-shadow: 4px 4px 0px #000;
            z-index: 10;
        }

        #czlonkowie {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        #czlonkowie h2 { color: #FF5555; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        #czlonkowie ul { list-style: none; padding: 0; font-weight: bold; text-shadow: 2px 2px #000; }
        .n1 { color: #55FFFF; } /* Blondi_Pl */
        .n2 { color: #FFFF55; } /* 0skar3377 */
        .n3 { color: #FF55FF; } /* Dorianek558 */

        #przycisk-blok {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: #5d4037;
            border: 4px solid #3e2723;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 4px 4px 0px #000;
        }

        .latajacy-blok {
            position: absolute;
            width: 45px;
            height: 45px;
            background-color: #795548; /* Brązowa ziemia */
            border-top: 15px solid #4caf50; /* Zielona trawa */
            box-sizing: border-box;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="napis-klan">KLAN</div>

    <div id="czlonkowie">
        <h2>CZŁONKOWIE</h2>
        <ul>
            <li class="n1">Blondi_Pl</li>
            <li class="n2">0skar3377</li>
            <li class="n3">Dorianek558</li>
        </ul>
    </div>

    <div id="przycisk-blok" onclick="toggleBlocks()">🌱</div>
    <div id="container-bloczkow"></div>

    <script>
        const container = document.getElementById('container-bloczkow');
        const bloczki = [];
        let widoczne = true;

        function stworz() {
            for (let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.className = 'latajacy-blok';
                let x = Math.random() * 90;
                let y = Math.random() * 80 + 10;
                let vx = (Math.random() - 0.5) * 0.4;
                let vy = (Math.random() - 0.5) * 0.4;
                container.appendChild(el);
                bloczki.push({el, x, y, vx, vy});
            }
        }

        function animuj() {
            bloczki.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > 95) b.vx *= -1;
                if(b.y < 0 || b.y > 95) b.vy *= -1;
                b.el.style.left = b.x + "%";
                b.el.style.top = b.y + "%";
            });
            requestAnimationFrame(animuj);
        }

        function toggleBlocks() {
            widoczne = !widoczne;
            container.style.opacity = widoczne ? "1" : "0";
        }

        stworz();
        animuj();
    </script>
</body>
</html>
